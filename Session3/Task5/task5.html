<html>
<head>
    <title>Food Order Form</title>
</head>
<body>

    <h2>Food Order Form</h2>

    <form action="#" method="post">

        <label for="orderId">Order ID:</label>
        
        
        <input type="text" id="orderId" name="orderId" value="ORD12345" disabled>
        <br><br>

        <label for="name">Customer Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="food">Food Item:</label>
        <select id="food" name="food">
>
        <option>waffles</option>
        <option>maggi</option>
        <option>frankie</option>
        </option>

        </select>
        <br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="1">
        <br><br>

        <label for="address">Delivery Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" value="Place Order">

    </form>
