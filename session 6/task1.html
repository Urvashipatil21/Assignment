
        <!DOCTYPE html>
<html>
<head>
    <title>Zomato Restaurant Card</title>

    <style>
        .restaurant-card {
            width: 300px;
            border: 2px solid black;
            margin: 50px;
            padding: 20px;
            background-color: #fff5f5;
        }

        .restaurant-name {
            padding: 10px;
            border-bottom: 1px solid gray;
        }

        .cuisine {
            padding: 10px;
            border-bottom: 1px solid gray;
        }

        .rating {
            padding: 10px;
            color: green;
        }
    </style>

</head>

<body>

    <h1>Zomato Restaurant</h1>

    <div class="restaurant-card">

        <div class="restaurant-name">
            <h2>Spice Garden Restaurant</h2>
        </div>

        <div class="cuisine">
            Cuisine: Indian, Chinese, Italian
        </div>

        <div class="rating">
            Rating: ⭐ 4.5/5
        </div>

    </div>

</body>
</html>
