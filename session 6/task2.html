
        <!DOCTYPE html>
<html>
<head>
    <title>Flipkart Product Tile</title>

    <style>
        .product-card {
            width: 250px;
            border: 2px solid gray;
            padding: 20px;
            margin: 30px;
        }

        img {
            width: 200px;
            display: block;
        }

        .product-name {
            display: block;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .price {
            display: inline-block;
            color: blue;
            font-size: 18px;
        }

        /* Price will hide when this class is added */
        .hide-price {
            display: none;
        }

    </style>

</head>

<body>

    <h1>Flipkart Product</h1>

    <div class="product-card">

        <img src="download (1).jpg" alt="Mobile">

        <span class="product-name">
            iPhone 15
        </span>

        <span class="price">
            ₹70,000
        </span>

    </div>


    <!-- Price hidden using hide-price class -->

    <div class="product-card">

        <img src="download.jpg" alt="Laptop">

        <span class="product-name">
            Laptop
        </span>

        <span class="price hide-price">
            ₹50,000
        </span>

    </div>


</body>
</html>
    </script>
</body>
</html>
