<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Fixed Badge</title>

    <style>

        body {
            height: 1000px;
        }

        .whatsapp-badge {
            position:-webkit-sticky;
            right: 20px;
            bottom: 20px;
            background-color: green;
            color: white;
            padding: 15px 20px;
            margin: 10px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>Website Content</h1>

    <p>
        Scroll the page and check the WhatsApp notification.
        It will stay fixed at the bottom right corner.
    </p>


    <!-- WhatsApp Chat Badge -->

    <div class="whatsapp-badge">
        WhatsApp 💬
    </div>


</body>
</html>
