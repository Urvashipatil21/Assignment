<!DOCTYPE html>
<html>
<head>
    <title>BookMyShow Movie Posters</title>

    <style>

        .movie-grid {
            display: flex;
            gap: 20px;
            margin: 30px;
        }

        .poster {
            position: relative;
            width: 200px;
        }

        .poster img {
            width: 200px;
            height: 280px;
        }

        .new-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            border-radius: 5px;
        }

    </style>

</head>

<body>

    <h1>BookMyShow Movie Posters</h1>

    <div class="movie-grid">

        <div class="poster">
            <img src="yjhd.jpg" alt="yeh jawanni hai dewaani">

            <div class="new-badge">
                New
            </div>
        </div>


        <div class="poster">
            <img src="p.jpg" alt="padmvat">
        </div>


        <div class="poster">
            <img src="p2.jpg" alt="baijrao mastani">
        </div>

    </div>


</body>
</html>
