<!DOCTYPE html>
<html>
<head>
    <title>Social Icons Using Flexbox</title>

    <style>
        .container {
            display: flex;
            justify-content: space-around; /* Gives equal spacing between icons */
            align-items: center;
            padding: 20px;
            border: 2px solid black;
        }

        .icon {
            width: 80px;
            height: 80px;
        }
    </style>
</head>

<body>

    <h2>My Favorite Apps</h2>

    <div class="container">
        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">

        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">

        <img class="icon" src="images.png" alt="Zomato">

        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify">
    </div>

</body>
</html>
