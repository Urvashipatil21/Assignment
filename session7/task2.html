<!DOCTYPE html>
<html>
<head>
    <title>Spotify Playlist Bar</title>

    <style>
        .playlist {
            display: flex;
            gap: 15px;
            padding: 20px;
            background-color: #222;
        }

        .song-card {
            width: 180px;
            height: 80px;
            background-color: #1db954;
            color: white;
            display: flex;
            align-items: center; /* Vertically centers text */
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>My Spotify Playlist</h2>

<div class="playlist">

    <div class="song-card">
        <p>Song: BEEDI <br> Artist:SUNIDI CHAHUN</p>
    </div>

    <div class="song-card">
        <p>Song: SUNIYAN SUNIYAN<br> Artist:JUSS</p>
    </div>

    <div class="song-card">
        <p>Song:TUM HO TOH <br> Artist: VISHAL MISHRA</p>
    </div>

    <div class="song-card">
        <p>Song: LALKARES<br> Artist: DILIJAT DOSANJH</p>
    </div>

    <div class="song-card">
        <p>Song: SHARARAT <br> Artist: JASMINE SANDLES</p>
    </div>

</div>

</body>
</html>
